# =============================================================================
# MCP Servers Configuration - Active Config
# =============================================================================
# This is your ACTIVE config file. It is loaded at startup.
# For a full reference of all keys and detailed docs, see:
#   mcp-config.example.properties (same directory)
#
# +=========================================================================+
# |  IMPORTANT:                                                             |
# |    1. This file is GITIGNORED - safe to put real values here            |
# |    2. Replace every <<<PLACEHOLDER>>> with your actual values           |
# |    3. Or use environment variables (MCP_* prefix) for secrets           |
# |                                                                         |
# |  QUICK FIND: Search for "<<<" to locate ALL required placeholders.      |
# +=========================================================================+
#
# Environment variable examples:
#   Linux/Mac:       export MCP_APIKEYS_GITHUB="ghp_abc123..."
#   Win PowerShell:  $env:MCP_APIKEYS_GITHUB = "ghp_abc123..."
#
# =============================================================================


# --- Global ---
config.activeProfile=development


# --- API Keys ----------------------------------------------------------------
# +-------------------------------------------------------------------------+
# |  Replace <<<PLACEHOLDER>>> values below OR set environment variables.   |
# |  See mcp-config.example.properties for format details and generation    |
# |  URLs for each key type.                                                |
# +-------------------------------------------------------------------------+

# GitHub: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
apiKeys.github=<<<YOUR_GITHUB_PERSONAL_ACCESS_TOKEN>>>

# OpenAI: sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
apiKeys.openai=<<<YOUR_OPENAI_API_KEY>>>


# --- Location ----------------------------------------------------------------
location.timezone=UTC
location.locale=en-US
location.region=


# --- Preferences -------------------------------------------------------------
preferences.theme=dark
preferences.logLevel=INFO
preferences.maxRetries=3
preferences.timeoutSeconds=30
preferences.autoConnect=true


# --- Browser -----------------------------------------------------------------
# +-------------------------------------------------------------------------+
# |  RECOMMENDED: Set a dedicated browser profile (e.g., "MCP-Isolated")   |
# |  to keep MCP sessions separate from your personal browsing.            |
# |  See mcp-config.example.properties for detailed browser setup docs.    |
# +-------------------------------------------------------------------------+

# Leave empty for system default browser, or set a path/name:
#   Examples: chrome, msedge, /usr/bin/google-chrome
browser.executable=

# Dedicated profile name for isolation (empty = default profile):
#   Examples: MCP-Isolated, Profile 2
browser.profile=

# Browser sync account (empty = no sync):
browser.account=

# How to open: new-window | new-tab | incognito | app-mode
browser.launchMode=new-window

# Headless mode (true = no visible UI): true | false
browser.headless=false

# Chrome DevTools Protocol port (0 = disabled): 0-65535
browser.remoteDebuggingPort=0

# Window size in pixels (0 = browser default):
browser.windowWidth=0
browser.windowHeight=0


# --- Servers -----------------------------------------------------------------

server.github.name=GitHub MCP Server
server.github.enabled=true
server.github.transport=stdio
server.github.command=npx
server.github.args=-y,@modelcontextprotocol/server-github
server.github.env.GITHUB_TOKEN=<<<YOUR_GITHUB_PERSONAL_ACCESS_TOKEN>>>

server.filesystem.name=Filesystem MCP Server
server.filesystem.enabled=true
server.filesystem.transport=stdio
server.filesystem.command=npx
server.filesystem.args=-y,@modelcontextprotocol/server-filesystem,<<<ABSOLUTE_PATH_TO_ALLOWED_DIRECTORY>>>


# --- Profiles ----------------------------------------------------------------

profile.development.description=Local development with debug logging
profile.development.preferences.logLevel=DEBUG
profile.development.preferences.timeoutSeconds=60
profile.development.browser.launchMode=new-window

profile.production.description=Production with reduced logging
profile.production.preferences.logLevel=WARN
profile.production.preferences.maxRetries=5
profile.production.preferences.timeoutSeconds=15
profile.production.browser.headless=true
