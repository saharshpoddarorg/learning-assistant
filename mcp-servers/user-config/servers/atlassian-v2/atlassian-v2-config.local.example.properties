# =============================================================================
# Atlassian MCP Server v2 — Local Configuration TEMPLATE
# =============================================================================
# COPY this file to: atlassian-v2-config.local.properties
# The .local.properties file is GITIGNORED — safe for secrets.
#
# OPTION A — Browser OAuth 2.0:
#   1. Register app at https://developer.atlassian.com/console/myapps/
#   2. Set Callback URL to: http://localhost:21337/callback
#   3. Grant scopes: read:jira-work, write:jira-work, read:jira-user,
#      read:confluence-space.summary, read:confluence-content.all,
#      write:confluence-content, read:confluence-user, offline_access
#   4. Fill in clientId and clientSecret below
#   5. Set auth.type=oauth2_browser
#   6. Use the auth_login_browser tool to authenticate in your browser
#
# OPTION B — API Token / PAT:
#   Cloud:       Get token from https://id.atlassian.com/manage/api-tokens
#   Data Center: Create PAT from your profile settings
# =============================================================================


# =============================================================================
# INSTANCE URLs — Replace with your actual instance
# =============================================================================

# Cloud example:
atlassian.jira.baseUrl=https://YOUR-INSTANCE.atlassian.net
atlassian.confluence.baseUrl=https://YOUR-INSTANCE.atlassian.net/wiki
# atlassian.bitbucket.baseUrl=https://api.bitbucket.org

# Data Center example:
# atlassian.jira.baseUrl=https://jira.yourcompany.com
# atlassian.confluence.baseUrl=https://confluence.yourcompany.com


# =============================================================================
# AUTHENTICATION — Choose ONE approach
# =============================================================================

# --- OPTION A: Browser OAuth 2.0 ---
# atlassian.auth.type=oauth2_browser
# atlassian.oauth.clientId=YOUR_OAUTH_CLIENT_ID
# atlassian.oauth.clientSecret=YOUR_OAUTH_CLIENT_SECRET

# --- OPTION B: API Token (Cloud) ---
atlassian.auth.type=api_token
atlassian.auth.email=your-email@company.com
atlassian.auth.token=YOUR_API_TOKEN_HERE

# --- OPTION B: PAT (Data Center) ---
# atlassian.auth.type=pat
# atlassian.auth.token=YOUR_PERSONAL_ACCESS_TOKEN


# =============================================================================
# PRODUCT ENABLES (override defaults)
# =============================================================================

# atlassian.product.bitbucket.enabled=true
