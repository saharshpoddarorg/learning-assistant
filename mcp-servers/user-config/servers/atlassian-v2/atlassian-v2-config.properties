# =============================================================================
# Atlassian MCP Server v2 — Base Configuration
# =============================================================================
# This file is COMMITTED to version control. Contains safe defaults only —
# NO secrets, tokens, or credentials.
#
# HOW CONFIG IS LOADED (highest precedence wins):
#   1. Environment variables      ATLASSIAN_* prefix
#   2. atlassian-v2-config.local.properties   Your secrets (GITIGNORED)
#   3. This file                  Shared defaults (committed)
#
# QUICK START:
#   cp atlassian-v2-config.local.example.properties atlassian-v2-config.local.properties
#   Fill in your credentials and instance URLs.
#
# WHAT'S NEW IN V2:
#   - OAuth 2.0 browser login support (Option A)
#   - 91 tools (up from 44 in v1)
#   - Pipelines, environments, deployments (Bitbucket)
#   - Components, versions, watchers, dashboards (Jira)
#   - Templates, restrictions, properties (Confluence)
#   - Typed JSON input schemas for all tools
# =============================================================================


# =============================================================================
# 1. INSTANCE IDENTITY
# =============================================================================

# A short label for this Atlassian instance.
atlassian.instance.name=my-atlassian-v2

# Deployment variant — determines default auth scheme and URL structure.
# Values: cloud | data_center | server | custom
atlassian.variant=cloud


# =============================================================================
# 2. PRODUCT BASE URLS
# =============================================================================
# Leave blank for products you don't use.
# Set real values in atlassian-v2-config.local.properties.
#
# Examples:
#   Cloud:
#     atlassian.jira.baseUrl=https://mycompany.atlassian.net
#     atlassian.confluence.baseUrl=https://mycompany.atlassian.net/wiki
#     atlassian.bitbucket.baseUrl=https://api.bitbucket.org
#
#   Data Center (self-hosted):
#     atlassian.jira.baseUrl=https://jira.mycompany.com
#     atlassian.confluence.baseUrl=https://confluence.mycompany.com
#     atlassian.bitbucket.baseUrl=https://bitbucket.mycompany.com

atlassian.jira.baseUrl=
atlassian.confluence.baseUrl=
atlassian.bitbucket.baseUrl=


# =============================================================================
# 3. AUTHENTICATION
# =============================================================================
# Two authentication approaches:
#
# OPTION A — Browser OAuth 2.0 (recommended for interactive use):
#   1. Register an OAuth app at https://developer.atlassian.com/console/myapps/
#   2. Set oauth.clientId and oauth.clientSecret in local config
#   3. Set auth.type=oauth2_browser
#   4. Use the auth_login_browser tool to authenticate
#
# OPTION B — Config file credentials:
#   auth.type=api_token → Basic auth (email + API token) for Cloud
#   auth.type=pat       → Bearer token (PAT) for Data Center
#
# If auth.type is blank, it is auto-detected:
#   - If OAuth client ID + secret are present → oauth2_browser
#   - If API token is present → api_token (Cloud) or pat (Data Center)

atlassian.auth.type=
atlassian.auth.email=
atlassian.auth.token=

# OAuth 2.0 settings (Option A)
atlassian.oauth.clientId=
atlassian.oauth.clientSecret=


# =============================================================================
# 4. PRODUCT ENABLES
# =============================================================================
# Controls which products are active. Disabled products omit their tools.

atlassian.product.jira.enabled=true
atlassian.product.confluence.enabled=true
atlassian.product.bitbucket.enabled=false


# =============================================================================
# 5. HTTP SETTINGS
# =============================================================================

# Connection timeout in milliseconds (default: 10 seconds)
atlassian.http.connectTimeoutMs=10000

# Read timeout in milliseconds (default: 30 seconds)
atlassian.http.readTimeoutMs=30000
